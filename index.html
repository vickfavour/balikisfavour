<section class="entry" id="enter">
    <h2 class="section-title">Submit Your Entry</h2>
    <form class="entry-form" action="https://formspree.io/f/YOUR_CODE_HERE" method="POST">
        
        <h3 class="form-section-title">Your Information</h3>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="Your name" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="08012345678" required>
        </div>
        <div class="form-group">
            <label>Network</label>
            <select name="network" required>
                <option value="">Select your network</option>
                <option value="mtn">MTN</option>
                <option value="airtel">Airtel</option>
                <option value="glo">GLO</option>
                <option value="9mobile">9mobile</option>
            </select>
        </div>
        <div class="form-group">
            <label>Telegram Username</label>
            <input type="text" name="telegram" placeholder="@yourusername" required>
        </div>
        <div class="form-group">
            <label>Bank Name</label>
            <input type="text" name="bank" placeholder="e.g. GTBank" required>
        </div>
        <div class="form-group">
            <label>Account Number</label>
            <input type="text" name="account" placeholder="1234567890" required>
        </div>

        <h3 class="form-section-title members-title">10 Members You Added</h3>
        <p class="members-note">Enter the phone numbers of the 10 people you added</p>
        
        <div class="members-grid">
            <div class="form-group member-input">
                <label>Member 1</label>
                <input type="tel" name="member_1" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 2</label>
                <input type="tel" name="member_2" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 3</label>
                <input type="tel" name="member_3" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 4</label>
                <input type="tel" name="member_4" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 5</label>
                <input type="tel" name="member_5" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 6</label>
                <input type="tel" name="member_6" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 7</label>
                <input type="tel" name="member_7" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 8</label>
                <input type="tel" name="member_8" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 9</label>
                <input type="tel" name="member_9" placeholder="08012345678" required>
            </div>
            <div class="form-group member-input">
                <label>Member 10</label>
                <input type="tel" name="member_10" placeholder="08012345678" required>
            </div>
        </div>

        <!-- Auto-reply email -->
        <input type="hidden" name="_replyto" value="bigdollar7000@gmail.com">
        
        <!-- Success page -->
        <input type="hidden" name="_next" value="https://vickfavour.github.io/Favour-victory/thanks.html">

        <label class="checkbox">
            <input type="checkbox" required>
            I confirm I added all 10 members to the Telegram group
        </label>
        <button type="submit" class="btn btn-submit">Submit Entry</button>
    </form>
    </section>
